name: Radar Bildirimleri (NYSE Saatine Göre)

on:
  schedule:
    # ── Sabah radarı (09:00 TR hedef → 06:00 UTC) ──────────────────────────
    # GitHub 3 saate kadar geciktirebilir → en geç 12:00 TR'de gelir
    - cron: "0 6 * * 1-5"

    # ── Öğleden sonra radarı (16:00 TR hedef → 13:00 UTC) ──────────────────
    # Yaz/kış farkı yok — tek cron yeterli
    - cron: "0 13 * * 1-5"

    # ── Watchlist Faz 1: Erken uyarı (11:00 TR hedef → 08:00 UTC) ──────────
    - cron: "0 8 * * 1-5"

    # ── Watchlist Faz 2: Tam analiz (20:00 TR hedef → 17:00 UTC) ───────────
    # Eski ayar: 23:30 TR → geç geliyordu. Yeni: 20:00 TR hedef
    - cron: "0 17 * * 1-5"

    # ── Haftalık rapor: Pazar (16:00 TR hedef → 13:00 UTC) ─────────────────
    - cron: "0 13 * * 0"

  workflow_dispatch:

jobs:
  # ── Günlük Radar ─────────────────────────────────────────────────────────
  radar:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.schedule == '0 6 * * 1-5' ||
      github.event.schedule == '0 13 * * 1-5'

    steps:
      - name: Kodu çek
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Bağımlılıkları yükle
        run: pip install -r requirements.txt

      - name: Radarı çalıştır
        env:
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          NEWS_API_KEY:       ${{ secrets.NEWS_API_KEY }}
          FMP_API_KEY:        ${{ secrets.FMP_API_KEY }}
          GH_PAT:             ${{ secrets.GH_TOKEN }}
          GITHUB_REPO:        ${{ secrets.GITHUB_REPO }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_EVENT_NAME:  ${{ github.event_name }}
        run: python morning_radar.py

  # ── Watchlist Faz 1: Erken Uyarı ────────────────────────────────────────
  watchlist-phase1:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.schedule == '0 8 * * 1-5'

    steps:
      - name: Kodu çek
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Bağımlılıkları yükle
        run: pip install -r requirements.txt

      - name: Faz 1 erken uyarı taraması
        env:
          PHASE:              "1"
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          NEWS_API_KEY:       ${{ secrets.NEWS_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          GH_PAT:             ${{ secrets.GH_TOKEN }}
          GITHUB_REPO:        ${{ secrets.GITHUB_REPO }}
        run: python watchlist_runner.py

  # ── Watchlist Faz 2: Tam Analiz ──────────────────────────────────────────
  watchlist-phase2:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.schedule == '0 17 * * 1-5'

    steps:
      - name: Kodu çek
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Bağımlılıkları yükle
        run: pip install -r requirements.txt

      - name: Faz 2 tam analiz
        env:
          PHASE:              "2"
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          NEWS_API_KEY:       ${{ secrets.NEWS_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          GH_PAT:             ${{ secrets.GH_TOKEN }}
          GITHUB_REPO:        ${{ secrets.GITHUB_REPO }}
        run: python watchlist_runner.py

  # ── Haftalık Rapor (Pazar) ────────────────────────────────────────────────
  weekly-report:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.schedule == '0 13 * * 0'

    steps:
      - name: Kodu çek
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Bağımlılıkları yükle
        run: pip install -r requirements.txt

      - name: Haftalık raporu çalıştır
        env:
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          NEWS_API_KEY:       ${{ secrets.NEWS_API_KEY }}
          FMP_API_KEY:        ${{ secrets.FMP_API_KEY }}
          GH_PAT:             ${{ secrets.GH_TOKEN }}
          GITHUB_REPO:        ${{ secrets.GITHUB_REPO }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python weekly_report.py
